services:
  - type: web
    name: greenline-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip uninstall -y emergentintegrations 2>/dev/null || true && pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/
    envVars:
      # Set this to your MongoDB Atlas connection string (mongodb+srv://...)
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: greenline_activations
      # Your Stripe live / test secret key (sk_live_... or sk_test_...).
      # DO NOT use sk_test_emergent in production.
      - key: STRIPE_API_KEY
        sync: false
      # Stripe webhook signing secret (whsec_...) — get this from the Stripe dashboard
      # after registering https://greenline-api.onrender.com/api/webhook/stripe
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # Resend API key (re_...) for order confirmation emails
      - key: RESEND_API_KEY
        sync: false
      # "From" address for order emails — must be a verified Resend sender domain
      - key: RESEND_FROM_EMAIL
        value: orders@greenlineactivations.com
      - key: APP_URL
        value: https://greenlineactivations.com
      - key: ALLOWED_ORIGINS
        value: https://greenlineactivations.com,https://www.greenlineactivations.com
      # CMS admin credentials — set these in the Render dashboard
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # Secret key for signing JWT tokens — set a long random string in Render dashboard
      - key: JWT_SECRET
        sync: false
      # Anthropic API key for AI-assisted CMS features
      - key: ANTHROPIC_API_KEY
        sync: false
      # Python version Render should use
      - key: PYTHON_VERSION
        value: "3.11.9"
